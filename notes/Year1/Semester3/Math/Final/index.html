<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes | Explorer</title>
  <link rel="stylesheet" href="../../../../../explorer.css">
</head>

<body>

  <aside>
    <div class="nav-header">Explorer</div>
    <a href="../" class="nav-item back">
      <span>← Go Back</span>
    </a>
  </aside>

  <main>
    <header>
      <h1>Files</h1>
    </header>

    <section class="file-grid" id="file-grid">
    </section>
  </main>

  <script>
    const grid = document.getElementById('file-grid');

    function getFileExtension(filename) {
      return filename.split('.').pop().toLowerCase();
    }

    function getFileIcon(ext) {
      const icons = {
        'pdf': '📄',
        'doc': '📋', 'docx': '📋',
        'xls': '📊', 'xlsx': '📊',
        'ppt': '🎯', 'pptx': '🎯',
        'zip': '📦', 'rar': '📦',
        'txt': '📝', 'md': '📝',
        'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
        'mp4': '🎬', 'avi': '🎬',
        'mp3': '🎵',
        'default': '📄'
      };
      return icons[ext] || icons['default'];
    }

    // Load folders first
    fetch('folders.json')
      .then(res => res.json())
      .then(folders => {
        folders.forEach(folder => {
          grid.innerHTML += `
            <a href="${folder}/" class="file-card">
        <div class="card-header">
          <div class="icon-wrapper">📁</div>
          <span class="file-badge badge-folder">Folder</span>
        </div>
        <span class="file-name">${folder}</span>
              <div class="file-meta">
                <span class="file-type">📂 Directory</span>
              </div>
            </a>`;
        });
      });

    // Then load files
    fetch('files.json')
      .then(res => res.json())
      .then(files => {
        files.forEach(file => {
          const name = file.replace(/\.[^\/]+$/, '');
          const ext = getFileExtension(file);
          const icon = getFileIcon(ext);
          grid.innerHTML += `
            <a href="${file}" class="file-card">
              <div class="card-header">
                <div class="icon-wrapper">${icon}</div>
                <span class="file-badge badge-file">File</span>
              </div>
              <span class="file-name">${name}</span>
              <div class="file-meta">
                <span class="file-type">${ext.toUpperCase()}</span>
              </div>
            </a>`;
        });
      });
  </script>

</body>

</html>
