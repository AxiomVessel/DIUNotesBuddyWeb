<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes | Explorer</title>
  <link rel="stylesheet" href="../../../../explorer.css">
</head>

<body>

  <aside>
    <div class="nav-header">Explorer</div>
    <a href="../" class="nav-item back">
      <span>← Go Back</span>
    </a>
  </aside>

  <main>
    <header>
      <h1>Files</h1>
    </header>

    <section class="file-grid" id="file-grid">
      <!-- Files will be loaded here automatically -->
    </section>
  </main>

  <script>
    fetch('files.json')
      .then(res => res.json())
      .then(files => {
        const grid = document.getElementById('file-grid');
        files.forEach(file => {
          const name = file.replace(/\.[^/.]+$/, ''); // removes extension
          grid.innerHTML += `
            <a href="${file}" class="file-card">
              <div class="folder-icon">📄</div>
              <span class="file-name">${name}</span>
            </a>`;
        });
      });
  </script>

</body>

</html>
